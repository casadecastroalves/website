<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="description" content="Identidade e Memória — Rede Movimento Irun nos Territórios de Identidade da Bahia">
  
  <!-- Open Graph / Social Sharing Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.casadecastroalves.com.br/territorios/">
  <meta property="og:title" content="Identidade e Memória — Movimento Irun">
  <meta property="og:description" content="Mapa interativo dos 27 Territórios de Identidade Cultural da Bahia.">
  <meta property="og:image" content="https://www.casadecastroalves.com.br/territorios/Territ%C3%B3rios_de_Identidade_do_Estado_da_Bahia.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  
  <title>Identidade e Memória — Movimento Irun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <button type="button" class="btn btn-icon btn-menu" id="btn-menu" aria-label="Abrir conteúdo" title="Conteúdo">
          <svg class="btn-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="header-brand" id="header-brand">
          <span class="brand-title">Identidade e Memória</span>
          <span class="brand-divider" id="brand-divider" hidden>|</span>
          <div class="header-location" id="header-location" hidden aria-live="polite"></div>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="btn btn-theme" id="btn-theme" aria-label="Alternar tema claro/escuro" aria-pressed="true">☀</button>
        <button type="button" class="btn" id="btn-ti" title="Mapa dos 27 Territórios de Identidade">
          <svg class="btn-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
          </svg>
          <span class="btn-text">Bahia</span>
        </button>
        <button type="button" class="btn" id="btn-rede" title="Rede Movimento Irun — 6 territórios">
          <svg class="btn-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="3"></circle>
            <circle cx="5" cy="19" r="3"></circle>
            <circle cx="19" cy="19" r="3"></circle>
            <line x1="6.7" y1="16.5" x2="10.3" y2="7.5"></line>
            <line x1="17.3" y1="16.5" x2="13.7" y2="7.5"></line>
            <line x1="8" y1="19" x2="16" y2="19"></line>
          </svg>
          <span class="btn-text">Rede</span>
        </button>
        <button type="button" class="btn" id="btn-conteudo-header" title="Abrir painel de conteúdo">
          <svg class="btn-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span class="btn-text">Conteúdo</span>
        </button>
        <button type="button" class="btn btn-share-icon" id="btn-share" title="Compartilhar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </button>
        <a class="btn" href="formulario.html" id="nav-formulario">
          <svg class="btn-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
          </svg>
          <span class="btn-text">Formulário</span>
        </a>
      </div>
    </header>

    <div class="offline-note" id="offline-note" hidden>
      Textos e polígonos disponíveis offline. Para mapa base, fotos e vídeos, conecte à internet.
    </div>

    <div class="main">
      <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>
      <aside class="sidebar" id="sidebar">
        <div class="tabs" id="tabs-territorio" role="tablist" hidden>
          <button type="button" class="tab active" data-tab="territorio">Território</button>
          <button type="button" class="tab" data-tab="cultura">Cultura</button>
          <button type="button" class="tab" data-tab="galeria">Galeria</button>
          <button type="button" class="tab" data-tab="memoria">Memória</button>
          <button type="button" class="tab" data-tab="roteiros">Roteiros</button>
        </div>
        <div class="sidebar-scroll">
          <div class="sidebar-panel tab-panel active" id="panel-territorio" role="tabpanel"></div>
          <div class="sidebar-panel tab-panel" id="panel-cultura" role="tabpanel"></div>
          <div class="sidebar-panel tab-panel" id="panel-galeria" role="tabpanel"></div>
          <div class="sidebar-panel tab-panel" id="panel-memoria" role="tabpanel"></div>
          <div class="sidebar-panel tab-panel" id="panel-roteiros" role="tabpanel"></div>
        </div>
      </aside>

      <div class="map-wrap">
        <div id="map" role="application" aria-label="Mapa interativo"></div>
        <div class="layer-chips" id="layer-chips" hidden></div>
        <button type="button" class="btn btn-primary btn-panel-map" id="btn-panel-map" title="Abrir conteúdo">
          <svg class="btn-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <span>Conteúdo</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <span class="footer-credit">Built by IG + Comunidade</span>
      <span class="footer-grimaux">GRIMAUX</span>
    </footer>
  </div>

  <div id="toast" class="toast" hidden></div>

  <div id="galeria-lightbox" class="galeria-lightbox" hidden>
    <button type="button" class="galeria-lightbox-backdrop" id="galeria-lightbox-backdrop" aria-label="Fechar"></button>
    <button type="button" class="galeria-lightbox-close" id="galeria-lightbox-close" aria-label="Fechar">&times;</button>
    <button type="button" class="galeria-lightbox-nav galeria-lightbox-prev" id="galeria-lightbox-prev" aria-label="Foto anterior">&lsaquo;</button>
    <button type="button" class="galeria-lightbox-nav galeria-lightbox-next" id="galeria-lightbox-next" aria-label="Próxima foto">&rsaquo;</button>
    <div class="galeria-lightbox-stage">
      <img id="galeria-lightbox-img" src="" alt="">
      <p class="galeria-lightbox-caption" id="galeria-lightbox-caption"></p>
      <p class="galeria-lightbox-meta"><span id="galeria-lightbox-index">1</span> / <span id="galeria-lightbox-total">1</span></p>
    </div>
  </div>

  <dialog id="dialog-share" class="dialog dialog-share">
    <div class="dialog-share-head">
      <h2>Compartilhar</h2>
      <p class="dialog-share-context" id="share-context"></p>
    </div>
    <div class="share-grid" id="share-grid">
      <button type="button" class="share-app" data-share="whatsapp">
        <span class="share-app-icon share-app-icon--wa" aria-hidden="true">W</span>
        WhatsApp
      </button>
      <button type="button" class="share-app" data-share="telegram">
        <span class="share-app-icon share-app-icon--tg" aria-hidden="true">T</span>
        Telegram
      </button>
      <button type="button" class="share-app" data-share="email">
        <span class="share-app-icon share-app-icon--mail" aria-hidden="true">@</span>
        E-mail
      </button>
      <button type="button" class="share-app" data-share="copy">
        <span class="share-app-icon" aria-hidden="true">⎘</span>
        Copiar
      </button>
    </div>
    <div class="share-actions">
      <button type="button" class="btn btn-primary" id="btn-share-native">Mais opções</button>
    </div>
    <details class="share-embed-details">
      <summary>Incorporar em site</summary>
      <p class="dialog-hint">Iframe para embed:</p>
      <textarea id="share-embed" class="share-embed" readonly rows="3"></textarea>
      <button type="button" class="btn" id="btn-copy-embed">Copiar incorporação</button>
    </details>
    <input type="hidden" id="share-url">
    <button type="button" class="btn btn-ghost btn-close-share" id="btn-close-share">Fechar</button>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="ti_bahia_geo.js"></script>
  <script src="lagoa_grande_geo.js"></script>
  <script src="roteiro_contra_costa_snippet.js"></script>
  <script src="dados.js"></script>
  <script src="app.js"></script>
</body>
</html>
